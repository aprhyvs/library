<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="reset.css">
  <script src="script.js" defer></script>
</head>
<body>

  <section class="library">
    <button class="library__button" id="open-add-book-modal">
      Add Book
    </button>
    <h1 class="title">
      Library
    </h1>
    <div class="bookshelf" id="bookshelf">
      <!-- 
      <div class="book">
        <p class="book__title">${book.title}</p>
        <p class="book__author">${book.author}</p>
        <p class="book__pages">${book.pages}</p>
        <p class="book__read">${book.read}</p>
      </div>
      -->
    </div>
  </section>

  <dialog id="add-book-modal">
    <button id="close-modal">
      Close Form
    </button>

    <form action="" id="add-book-form">
      <label for="book-title">Title</label>
      <input type="text" name="book-title" id="book-title">

      <label for="book-author">Author</label>
      <input type="text" name="book-author" id="book-author">

      <label for="book-pages">Pages</label>
      <input type="number" name="book-pages" id="book-pages">

      <label for="book-read">Have you read it?</label>
      <select name="book-read" id="book-read">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <button type="submit" id="submit-book">
        Submit
      </button>
    </form>

  </dialog>
</body>
</html>
